{% extends 'base.html' %}


{% block head %} 
<title>404 Error</title>
{% endblock%}

{% block body %} 
<h1>404 Error</h1>
    <!-- display errors if any -->
    {% if errors %}
        <div style="color: red;">
            <h4>Invalid Form:</h4>
            <ul>
                {% for field, field_errors in errors.items() %}
                    {% for error in field_errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                {% endfor %}
            </ul>
        </div>
    {% endif %}
<a href="{{ url_for('home') }}">Go to home</a>
{% endblock%}
